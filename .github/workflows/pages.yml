name: Build and deploy Climate Connectivity Taxonomy to GitHub Pages

# Builds a static SkoHub Vocabs site from the committed concepts.ttl and publishes
# it to GitHub Pages. This workflow does NOT touch the connectivity-hub — it builds
# only from the versioned concepts.ttl in the repo, so deploys are fast and never
# degraded by hub flakiness. The data is refreshed separately by refresh-vocab.yml,
# which fetches from the hub and commits a fresh concepts.ttl (only when complete);
# that commit then triggers this workflow.

on:
  # rebuild when the data or the pipeline changes
  push:
    branches: [main]
    paths:
      - concepts.ttl
      - config.yaml
      - scripts/**
      - .github/workflows/pages.yml
  # let the maintainer rebuild from the committed data by hand
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, but let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install rdflib
        run: pip install rdflib

      - name: Normalise the vocabulary (licence + hierarchy + de-dup)
        # Build from the committed concepts.ttl — no live fetch from the hub.
        run: |
          mkdir -p data
          python scripts/prepare_vocab.py concepts.ttl data/concepts.ttl

      - name: Build the SkoHub site
        run: |
          # Project Pages are served from /<repo>, so the site must be built
          # with that path prefix (SkoHub reads it from BASEURL).
          echo "BASEURL=/${GITHUB_REPOSITORY#*/}" > .env
          mkdir -p public && chmod 777 public
          # The image builds the site with Gatsby at run time (CMD `npm run
          # container-build`, source under /app). We override the entrypoint to
          # first apply our build-time patches and then run that same build:
          #   - patch_search_tree.sh    fixes SkoHub's search so a matched parent
          #     concept shows its subtree;
          #   - patch_concept_hub_link.sh adds a "View in the Connectivity Hub"
          #     link to every term page (deterministic from the concept UUID).
          # Each patch hard-fails if the upstream source moved, so a broken patch
          # stops the deploy instead of silently shipping the old behaviour.
          docker run --rm \
            --entrypoint /bin/sh \
            -v "$PWD/public:/app/public" \
            -v "$PWD/data:/app/data" \
            -v "$PWD/.env:/app/.env" \
            -v "$PWD/config.yaml:/app/config.yaml" \
            -v "$PWD/scripts/patch_search_tree.sh:/tmp/patch_search_tree.sh:ro" \
            -v "$PWD/scripts/patch_concept_hub_link.sh:/tmp/patch_concept_hub_link.sh:ro" \
            skohub/skohub-vocabs-docker:latest \
            -c "sh /tmp/patch_search_tree.sh && sh /tmp/patch_concept_hub_link.sh && npm run container-build"

      - name: Reclaim ownership of the built site
        # The SkoHub container runs as root, so it writes public/ as root. The
        # post-build steps below run as the non-root runner and can't overwrite
        # those files (PermissionError) — hand ownership back to the runner first.
        run: sudo chown -R "$(id -u):$(id -g)" public

      - name: Sort the navigation tree alphabetically
        # SkoHub renders the nav tree in the JSON's array order, with no sorting of
        # its own, so the ~1000 top concepts and their children come out unordered
        # and structured branches are hard to find by browsing. Sort every
        # hasTopConcept/narrower array in the built output by prefLabel.
        run: python scripts/sort_tree.py public

      - name: Fix the navigation tree indentation
        # SkoHub indents parent rows ~25px past their leaf siblings (the expand
        # toggle is an in-row flex child), so an expanded parent looks nested under
        # the leaf above it. Inject CSS that aligns leaf rows with their siblings.
        run: python scripts/fix_tree_indent.py public

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
